{% extends "base.html" %}
{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-semibold">ETV-Unterschriftenliste</h1>
    <p class="text-sm text-slate-500 mt-1">
        Eigentümerversammlung auswählen, druckfertige Unterschriftenliste als PDF herunterladen.
    </p>
</div>

{% if error %}
<div class="mb-4 rounded-md border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-800">
    {{ error }}
</div>
{% endif %}

<form method="post" action="/workflows/etv-signature-list/generate"
      class="rounded-lg bg-white border border-slate-200 p-6 max-w-2xl">
    <label for="conference_id" class="block text-sm font-medium text-slate-700 mb-2">
        Eigentümerversammlung
    </label>
    <select id="conference_id"
            name="conference_id"
            required
            {% if not options %}disabled{% endif %}
            class="block w-full rounded-md border border-slate-300 bg-white px-3 py-2 text-sm focus:border-slate-500 focus:ring-1 focus:ring-slate-500 disabled:bg-slate-100 disabled:text-slate-400">
        {% if options %}
        <option value="" disabled selected>— Versammlung wählen —</option>
        {% for opt in options %}
        <option value="{{ opt.id }}">{{ opt.label }}</option>
        {% endfor %}
        {% else %}
        <option value="" disabled selected>Keine Versammlungen verfügbar</option>
        {% endif %}
    </select>

    <p class="mt-2 text-xs text-slate-500">
        Sortiert nach Datum (neueste zuerst). Quelle: Facilioo.
    </p>

    <div class="mt-6 flex items-center gap-3">
        <button type="submit"
                {% if not options %}disabled{% endif %}
                class="inline-flex items-center gap-2 rounded-md bg-slate-900 text-white px-4 py-2 text-sm font-medium hover:bg-slate-800 disabled:bg-slate-300 disabled:cursor-not-allowed">
            <svg class="h-4 w-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
            </svg>
            PDF erzeugen
        </button>
        <a href="/" class="text-sm text-slate-500 hover:text-slate-800">Abbrechen</a>
    </div>
</form>
{% endblock %}
