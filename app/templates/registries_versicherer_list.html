{% extends "base.html" %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-900">Versicherer</h1>
    <p class="text-sm text-slate-500 mt-1">Portfolio-Übersicht aller Versicherer mit aggregierten Kennzahlen.</p>
</div>

<div class="rounded-lg bg-white border border-slate-200 overflow-hidden">
    <table class="w-full text-sm">
        <thead class="bg-slate-50 border-b border-slate-200">
            <tr>
                <th class="text-left px-4 py-3 font-semibold text-slate-700
                           cursor-pointer select-none hover:bg-slate-100"
                    hx-get="/registries/versicherer/rows?sort=name&order=asc"
                    hx-target="#versicherer-rows"
                    hx-swap="outerHTML"
                    title="Nach Name sortieren">
                    Name
                    <svg class="inline h-3 w-3 ml-1 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </th>
                <th class="text-right px-4 py-3 font-semibold text-slate-700
                           cursor-pointer select-none hover:bg-slate-100"
                    hx-get="/registries/versicherer/rows?sort=policen_anzahl&order=desc"
                    hx-target="#versicherer-rows"
                    hx-swap="outerHTML"
                    title="Nach Policen-Anzahl absteigend sortieren">
                    Policen
                    <svg class="inline h-3 w-3 ml-1 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </th>
                <th class="text-right px-4 py-3 font-semibold text-slate-700
                           cursor-pointer select-none hover:bg-slate-100"
                    hx-get="/registries/versicherer/rows?sort=gesamtpraemie&order=desc"
                    hx-target="#versicherer-rows"
                    hx-swap="outerHTML"
                    title="Nach Gesamtprämie absteigend sortieren">
                    Prämie p.a.
                    <svg class="inline h-3 w-3 ml-1 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </th>
                <th class="text-right px-4 py-3 font-semibold text-slate-700
                           cursor-pointer select-none hover:bg-slate-100"
                    hx-get="/registries/versicherer/rows?sort=schadensquote&order=desc"
                    hx-target="#versicherer-rows"
                    hx-swap="outerHTML"
                    title="Nach Schadensquote absteigend sortieren">
                    Schadensquote
                    <svg class="inline h-3 w-3 ml-1 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </th>
                <th class="text-right px-4 py-3 font-semibold text-slate-700
                           cursor-pointer select-none hover:bg-slate-100"
                    hx-get="/registries/versicherer/rows?sort=objekte_anzahl&order=desc"
                    hx-target="#versicherer-rows"
                    hx-swap="outerHTML"
                    title="Nach Objekt-Anzahl absteigend sortieren">
                    Objekte
                    <svg class="inline h-3 w-3 ml-1 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </th>
            </tr>
        </thead>
        {% include "_versicherer_rows.html" %}
    </table>
</div>
{% endblock %}
