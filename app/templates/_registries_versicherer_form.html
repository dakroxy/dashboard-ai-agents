{# Inline-Sub-Formular fuer neuen Versicherer (Story 2.1 AC3).
   Wird via hx-get in #new-versicherer-inline geladen.
   Nach Submit: Server antwortet mit OOB-Dropdown + leerem Container. #}

<div class="border border-indigo-200 rounded-lg p-3 bg-indigo-50 mt-2">
    <h4 class="text-xs font-semibold text-indigo-800 mb-2">Neuer Versicherer</h4>
    {% if error %}
    <p class="text-xs text-red-600 mb-2">{{ error }}</p>
    {% endif %}
    <form hx-post="/registries/versicherer">
        <div class="grid grid-cols-1 gap-2 mb-2">
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-0.5">Name <span class="text-red-500">*</span></label>
                <input type="text" name="name" required
                       class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
            </div>
            <div>
                <label class="block text-xs font-medium text-slate-600 mb-0.5">Adresse</label>
                <input type="text" name="adresse"
                       class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-0.5">E-Mail</label>
                    <input type="email" name="kontakt_email"
                           class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-600 mb-0.5">Telefon</label>
                    <input type="text" name="kontakt_tel"
                           class="w-full border border-slate-300 rounded px-2 py-1 text-sm">
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button type="submit"
                    class="px-3 py-1 rounded bg-indigo-600 text-white text-xs hover:bg-indigo-700">
                Anlegen
            </button>
            <button type="button"
                    onclick="document.getElementById('new-versicherer-inline').innerHTML=''"
                    class="px-3 py-1 rounded border border-slate-300 text-slate-600 text-xs hover:bg-slate-100">
                Abbrechen
            </button>
        </div>
    </form>
</div>
