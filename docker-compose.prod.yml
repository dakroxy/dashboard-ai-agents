services:
  app:
    image: ghcr.io/dakroxy/dashboard-ai-agents:latest
    environment:
      APP_ENV: ${APP_ENV}
      BASE_URL: ${BASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_HOSTED_DOMAIN: ${GOOGLE_HOSTED_DOMAIN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      IMPOWER_BASE_URL: ${IMPOWER_BASE_URL}
      IMPOWER_BEARER_TOKEN: ${IMPOWER_BEARER_TOKEN}
      INITIAL_ADMIN_EMAILS: ${INITIAL_ADMIN_EMAILS}
    volumes:
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  uploads:
